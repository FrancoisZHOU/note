<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#131519">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>INBOX</title>
<style>
:root{
  --bg:#131519; --panel:#1D212A; --panel-2:#262B36;
  --amber:#E2A93F; --amber-dim:#B88630;
  --text:#E9E7E1; --faded:#878D99; --line:#2C3340;
  --red:#D2422A; --ok:#4CAF7D;
  --mono:ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,'PingFang SC','MiSans','Noto Sans SC',sans-serif;min-height:100%;}
body{max-width:560px;margin:0 auto;padding:0 16px 84px;}

header{display:flex;align-items:baseline;justify-content:space-between;padding:18px 2px 8px;}
header h1{font-size:19px;font-weight:800;letter-spacing:.14em;color:var(--amber);}
header h1 span{color:var(--faded);font-size:12px;font-weight:400;margin-left:8px;letter-spacing:.04em;}
#statInfo{font-family:var(--mono);font-size:11px;color:var(--faded);}

#backupBanner{display:none;margin:6px 0 2px;padding:10px 14px;border-radius:10px;
  font-size:13px;line-height:1.5;background:rgba(210,66,42,.14);
  border:1px solid rgba(210,66,42,.45);color:#F2B4A6;}
#backupBanner b{font-family:var(--mono);}

/* ---- 录入区 ---- */
#inBar{margin-top:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:11px 11px 12px;
  box-shadow:0 6px 22px rgba(0,0,0,.35);}
#modeChips{display:flex;gap:8px;margin-bottom:9px;}
.chip{background:none;border:1px solid var(--line);color:var(--faded);font-size:12.5px;
  padding:5px 14px;border-radius:99px;cursor:pointer;}
.chip.on{background:var(--amber);color:#1B1608;border-color:var(--amber);font-weight:800;}
#inText{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px;font-size:15px;line-height:1.55;resize:none;
  min-height:64px;font-family:inherit;}
#inText:focus{outline:none;border-color:var(--amber-dim);}
#inRow{display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
#inHint{font-size:11px;color:var(--faded);font-family:var(--mono);}
#inSave{background:var(--amber);color:#1B1608;border:none;border-radius:9px;
  padding:10px 26px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.1em;}
#inSave:active{background:var(--amber-dim);}

/* ---- 搜索 ---- */
#searchWrap{margin:14px 0 4px;}
#searchBox{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:99px;padding:10px 16px;font-size:13.5px;}
#searchBox:focus{outline:none;border-color:var(--amber-dim);}

/* ---- 列表 ---- */
#feed{margin-top:14px;}
.mhead{display:flex;align-items:baseline;gap:8px;padding:12px 2px 8px;
  border-bottom:1px solid var(--line);margin-bottom:10px;}
.mhead .mt{font-size:14px;font-weight:700;letter-spacing:.05em;}
.mhead small{font-family:var(--mono);color:var(--faded);font-size:11px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;margin-bottom:9px;cursor:pointer;}
.card:active{background:var(--panel-2);}
.card .ct{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;}
.card .cd{font-family:var(--mono);font-size:10.5px;color:var(--amber-dim);letter-spacing:.03em;}
.card .cm{font-family:var(--mono);font-size:10.5px;color:var(--faded);}
.card .tx{font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
.item{display:flex;gap:10px;align-items:flex-start;padding:5px 0;font-size:14px;line-height:1.5;}
.item .cb{flex-shrink:0;width:19px;height:19px;border:1.6px solid var(--faded);border-radius:50%;
  margin-top:1px;display:flex;align-items:center;justify-content:center;color:transparent;font-size:12px;}
.item.done .cb{background:var(--ok);border-color:var(--ok);color:#0F1512;}
.item.done .it{text-decoration:line-through;color:var(--faded);}
.item .it{flex:1;word-break:break-word;}
#empty{margin-top:44px;text-align:center;color:var(--faded);font-size:13.5px;line-height:2;}
#empty .n{font-size:30px;display:block;margin-bottom:6px;opacity:.6;}

/* ---- 底栏 ---- */
#footBar{position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:rgba(19,21,25,.93);backdrop-filter:blur(10px);border-top:1px solid var(--line);}
#footInner{max-width:560px;margin:0 auto;display:flex;gap:8px;align-items:center;
  padding:9px 16px calc(9px + env(safe-area-inset-bottom));}
.fBtn{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);
  font-size:12.5px;padding:11px 4px;border-radius:9px;cursor:pointer;font-weight:600;}
.fBtn:active{background:var(--panel-2);}
#persistTag{font-family:var(--mono);font-size:10px;color:var(--faded);white-space:nowrap;}

#toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);
  background:var(--amber);color:#1B1608;font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:99px;opacity:0;pointer-events:none;
  transition:.25s;z-index:70;box-shadow:0 6px 20px rgba(0,0,0,.5);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- 编辑卡 ---- */
#nEdit{position:fixed;inset:0;z-index:85;background:rgba(10,11,14,.9);display:none;
  align-items:flex-end;justify-content:center;}
#nEdit.open{display:flex;}
#nCard{width:100%;max-width:560px;background:var(--panel);border-radius:16px 16px 0 0;
  padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}
#nCard h3{font-size:15px;margin-bottom:4px;letter-spacing:.03em;}
#neMeta{font-family:var(--mono);font-size:10.5px;color:var(--faded);margin-bottom:12px;line-height:1.7;}
#neDate{font-family:var(--mono);background:var(--bg);border:1px solid var(--line);color:var(--text);
  border-radius:9px;padding:10px 12px;font-size:14px;margin-bottom:10px;}
#neText{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
  border-radius:9px;padding:11px 12px;font-size:14px;line-height:1.6;resize:vertical;
  min-height:110px;font-family:inherit;}
#nBtns{display:flex;gap:10px;margin-top:14px;}
#neSave{flex:1;background:var(--amber);color:#1B1608;border:none;border-radius:9px;
  padding:12px;font-weight:800;font-size:14px;cursor:pointer;}
#neDel{background:rgba(210,66,42,.15);color:#F0977F;border:1px solid rgba(210,66,42,.5);
  border-radius:9px;padding:12px 16px;font-size:13.5px;cursor:pointer;}
#neCancel{background:none;border:1px solid var(--line);color:var(--faded);
  border-radius:9px;padding:12px 16px;font-size:13.5px;cursor:pointer;}

/* ---- 附件 ---- */
#attRow{display:flex;gap:8px;margin-top:9px;align-items:center;}
.aBtn{background:var(--bg);border:1px solid var(--line);color:var(--text);
  font-size:16px;width:44px;height:40px;border-radius:9px;cursor:pointer;}
.aBtn:active{background:var(--panel-2);}
#recBtn.rec{background:var(--red);border-color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.6}}
#pendWrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.pend{display:flex;align-items:center;gap:6px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:9px;padding:5px 8px;font-size:11.5px;max-width:100%;}
.pend img{width:30px;height:30px;object-fit:cover;border-radius:5px;}
.pend .px{color:var(--red);font-size:14px;padding:0 3px;cursor:pointer;}
.pend .pn{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--faded);}
.attsGrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.att{position:relative;cursor:pointer;}
.att img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block;}
.att .vtag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.att .vdur{position:absolute;right:3px;bottom:3px;font-family:var(--mono);font-size:9px;
  background:rgba(0,0,0,.7);color:#eee;padding:1px 4px;border-radius:4px;}
.attChip{display:flex;align-items:center;gap:7px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:99px;padding:7px 13px;font-size:12px;cursor:pointer;}
.attChip.playing{border-color:var(--amber);color:var(--amber);}
.geoTag{font-family:var(--mono);font-size:10px;color:var(--faded);}
#imgView{position:fixed;inset:0;z-index:96;background:rgba(8,9,12,.97);display:none;
  align-items:center;justify-content:center;padding:14px;}
#imgView.open{display:flex;}
#imgView img{max-width:100%;max-height:92%;border-radius:8px;}
#ivCap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(14px + env(safe-area-inset-bottom));
  text-align:center;font-family:var(--mono);font-size:11px;color:var(--faded);background:rgba(8,9,12,.8);}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ---- PIN 门锁 ---- */
#lock{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:30px;}
#lock.open{display:flex;}
#lock .li{font-size:38px;margin-bottom:16px;}
#lock h2{font-size:17px;letter-spacing:.1em;margin-bottom:6px;color:var(--amber);}
#lock p{color:var(--faded);font-size:12.5px;margin-bottom:22px;text-align:center;line-height:1.7;}
#pinIn{width:190px;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:13px;font-size:22px;text-align:center;
  font-family:var(--mono);letter-spacing:.4em;}
#pinIn:focus{outline:none;border-color:var(--amber-dim);}
#pinBtn{margin-top:16px;background:var(--amber);color:#1B1608;border:none;border-radius:9px;
  padding:12px 42px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.1em;}
#pinErr{color:#F0977F;font-size:12px;margin-top:12px;min-height:16px;font-family:var(--mono);}
</style>
</head>
<body>

<header>
  <h1>INBOX<span>收件箱</span></h1>
  <div id="statInfo"></div>
</header>

<div id="backupBanner"></div>

<div id="inBar">
  <div id="modeChips">
    <button class="chip on" data-k="note">📝 记录</button>
    <button class="chip" data-k="list">☑ 清单</button>
  </div>
  <textarea id="inText" rows="3" placeholder="想到什么倒什么。语音、粘贴都行。"></textarea>
  <div id="attRow">
    <button class="aBtn" id="recBtn" title="按住录音">🎤</button>
    <button class="aBtn" id="imgBtn">📷</button>
    <button class="aBtn" id="vidBtn">🎬</button>
    <button class="aBtn" id="fileBtn">📎</button>
    <input type="file" id="imgIn" accept="image/*" multiple hidden>
    <input type="file" id="vidIn" accept="video/*" multiple hidden>
    <input type="file" id="fileIn" multiple hidden>
  </div>
  <div id="pendWrap"></div>
  <div id="inRow">
    <span id="inHint"></span>
    <button id="inSave">存</button>
  </div>
</div>

<div id="searchWrap"><input id="searchBox" type="search" placeholder="🔍 搜索全部记录…"></div>

<div id="feed"></div>
<div id="empty" style="display:none">
  <span class="n">📥</span>
  空的。<br>大脑里闪过的东西,倒进来就归档了。
</div>

<div id="footBar">
  <div id="footInner">
    <button class="fBtn" id="btnCopy">📋 复制全部</button>
    <button class="fBtn" id="btnCsv">⬇ CSV</button>
    <button class="fBtn" id="btnJson">⬇ JSON</button>
    <button class="fBtn" id="btnImport">⇅ 导入</button>
    <input type="file" id="impFile" accept=".json,application/json" hidden>
    <div id="persistTag">…</div>
  </div>
</div>

<div id="toast"></div>

<div id="lock">
  <div class="li">🔐</div>
  <h2 id="lockTitle"></h2>
  <p id="lockSub"></p>
  <input id="pinIn" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
  <button id="pinBtn"></button>
  <div id="pinErr"></div>
</div>

<div id="nEdit">
  <div id="nCard">
    <h3>编辑</h3>
    <div id="neMeta"></div>
    <div class="row"><input type="date" id="neDate" style="flex:1;">
      <button id="neRemind" style="background:var(--panel-2);border:1px solid var(--line);color:var(--amber);border-radius:9px;padding:0 16px;font-size:16px;cursor:pointer;">⏰</button></div>
    <textarea id="neText"></textarea>
    <div id="neAtts" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;"></div>
    <div id="nBtns">
      <button id="neSave">保存</button>
      <button id="neDel">彻底删除</button>
      <button id="neCancel">取消</button>
    </div>
  </div>
</div>

<div id="imgView"><img id="ivImg" alt=""><div id="ivCap"></div></div>

<div id="rmSheet" style="position:fixed;inset:0;z-index:95;background:rgba(10,11,14,.92);display:none;align-items:flex-end;justify-content:center;">
  <div style="width:100%;max-width:560px;background:var(--panel);border-radius:16px 16px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--line);">
    <h3 style="font-size:15px;margin-bottom:4px;">⏰ 提醒</h3>
    <div id="rmTitle" style="font-size:12px;color:var(--faded);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
    <input type="datetime-local" id="rmWhen" style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px 12px;font-size:14px;font-family:var(--mono);margin-bottom:10px;">
    <div style="display:flex;gap:7px;margin-bottom:12px;">
      <button class="chip rq" data-q="1h">1小时后</button>
      <button class="chip rq" data-q="tonight">今晚20:00</button>
      <button class="chip rq" data-q="morning">明早9:00</button>
    </div>
    <div style="font-size:11px;color:var(--faded);margin-bottom:7px;">日历提醒偏移(可多选)</div>
    <div id="rmOffsets" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;">
      <button class="chip ro" data-m="0">准点</button>
      <button class="chip ro" data-m="10">提前10分</button>
      <button class="chip ro" data-m="30">提前30分</button>
      <button class="chip ro" data-m="60">提前1小时</button>
      <button class="chip ro" data-m="1440">提前1天</button>
    </div>
    <div style="display:flex;gap:10px;">
      <button id="rmAlarm" style="flex:1;display:none;background:var(--amber);color:#1B1608;border:none;border-radius:9px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;">⏰ 设系统闹钟</button>
      <button id="rmIcs" style="flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;">📅 日历提醒</button>
      <button id="rmCancel" style="background:none;border:1px solid var(--line);color:var(--faded);border-radius:9px;padding:13px 16px;font-size:13.5px;cursor:pointer;">取消</button>
    </div>
  </div>
</div>

<script>
/* ============ 常量与DB ============ */
const DB_NAME='inbox-db',STORE='notes',WARN_DAYS=35;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{e.target.result.createObjectStore(STORE,{keyPath:'id'});};
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=()=>rej(r.error);
  });
}
const tx=m=>db.transaction(STORE,m).objectStore(STORE);
const P=q=>new Promise((res,rej)=>{q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});
const put=r=>P(tx('readwrite').put(r)),del=i=>P(tx('readwrite').delete(i)),all=()=>P(tx('readonly').getAll());

/* ============ 工具 ============ */
const pad=n=>String(n).padStart(2,'0');
const dateKeyOf=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const monthOf=k=>k.slice(0,7);
const hm=ts=>{const d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes());};
function toast(msg,ms=1600){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),ms);
}
const uid=p=>(p||'')+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ============ 遥测 ============ */
let focusT0=null;
document.getElementById('inText').addEventListener('focus',()=>{if(!focusT0)focusT0=Date.now();});

/* ============ 附件采集 ============ */
const FILE_LIMIT=10*1048576;
let pendingAtts=[];
function blobToB64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;r.readAsDataURL(blob);
  });
}
function b64ToBlob(b64,type){
  const bin=atob(b64),arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:type||'application/octet-stream'});
}
async function loadBitmap(file){
  try{return await createImageBitmap(file,{imageOrientation:'from-image'});}
  catch(e){
    return new Promise((res,rej)=>{
      const url=URL.createObjectURL(file),img=new Image();
      img.onload=()=>{URL.revokeObjectURL(url);res(img);};
      img.onerror=rej;img.src=url;
    });
  }
}
function drawScaled(src,maxEdge,q){
  const w0=src.width||src.naturalWidth,h0=src.height||src.naturalHeight;
  const sc=Math.min(1,maxEdge/Math.max(w0,h0));
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(w0*sc));c.height=Math.max(1,Math.round(h0*sc));
  c.getContext('2d').drawImage(src,0,0,c.width,c.height);
  return new Promise(res=>c.toBlob(res,'image/jpeg',q));
}
function videoThumb(file){
  return new Promise(res=>{
    const url=URL.createObjectURL(file);
    const v=document.createElement('video');
    v.preload='metadata';v.muted=true;v.playsInline=true;v.src=url;
    let dur=null;
    v.onloadeddata=()=>{dur=v.duration;try{v.currentTime=Math.min(0.5,(v.duration||1)/2);}catch(e){fin(null);}};
    v.onseeked=()=>{
      try{
        const sc=Math.min(1,260/Math.max(v.videoWidth,v.videoHeight));
        const c=document.createElement('canvas');
        c.width=Math.max(1,Math.round(v.videoWidth*sc));
        c.height=Math.max(1,Math.round(v.videoHeight*sc));
        c.getContext('2d').drawImage(v,0,0,c.width,c.height);
        c.toBlob(b=>fin(b),'image/jpeg',0.6);
      }catch(e){fin(null);}
    };
    v.onerror=()=>fin(null);
    function fin(thumb){URL.revokeObjectURL(url);res({thumb:thumb,dur:dur});}
  });
}
document.getElementById('imgBtn').onclick=()=>document.getElementById('imgIn').click();
document.getElementById('vidBtn').onclick=()=>document.getElementById('vidIn').click();
document.getElementById('fileBtn').onclick=()=>document.getElementById('fileIn').click();
document.getElementById('imgIn').onchange=async e=>{
  for(const f of e.target.files){
    try{
      const bmp=await loadBitmap(f);
      const blob=await drawScaled(bmp,1200,0.65);
      const thumb=await drawScaled(bmp,260,0.6);
      if(bmp.close)bmp.close();
      pendingAtts.push({id:uid('a'),kind:'img',name:f.name||'照片.jpg',mime:'image/jpeg',size:blob.size,blob:blob,thumb:thumb});
    }catch(err){toast('图片处理失败');}
  }
  e.target.value='';renderPending();
};
document.getElementById('vidIn').onchange=async e=>{
  for(const f of e.target.files){
    const {thumb,dur}=await videoThumb(f);
    pendingAtts.push({id:uid('a'),kind:'vref',name:f.name||'video',mime:f.type,size:f.size,dur:dur,thumb:thumb,blob:null});
  }
  e.target.value='';renderPending();
  toast('视频存为索引卡,原件留在相册');
};
document.getElementById('fileIn').onchange=async e=>{
  for(const f of e.target.files){
    if(f.size<=FILE_LIMIT){
      pendingAtts.push({id:uid('a'),kind:'file',name:f.name,mime:f.type,size:f.size,blob:f,thumb:null});
    }else{
      pendingAtts.push({id:uid('a'),kind:'fref',name:f.name,mime:f.type,size:f.size,blob:null,thumb:null});
      toast('超10MB,存为索引卡');
    }
  }
  e.target.value='';renderPending();
};
/* 按住录音 */
let mediaRec=null,recChunks=[],recT0=0;
const recBtn=document.getElementById('recBtn');
async function startRec(){
  if(mediaRec&&mediaRec.state==='recording')return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec=new MediaRecorder(stream);
    recChunks=[];recT0=Date.now();
    mediaRec.ondataavailable=ev=>recChunks.push(ev.data);
    mediaRec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const dur=Math.round((Date.now()-recT0)/1000);
      if(dur<1){toast('太短,按住说话');return;}
      const blob=new Blob(recChunks,{type:mediaRec.mimeType||'audio/webm'});
      pendingAtts.push({id:uid('a'),kind:'audio',name:'语音',mime:blob.type,size:blob.size,dur:dur,blob:blob,thumb:null});
      renderPending();
    };
    mediaRec.start();
    recBtn.classList.add('rec');
  }catch(e){toast('麦克风不可用/未授权');}
}
function stopRec(){
  if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();
  recBtn.classList.remove('rec');
}
recBtn.addEventListener('pointerdown',e=>{e.preventDefault();startRec();});
recBtn.addEventListener('pointerup',stopRec);
recBtn.addEventListener('pointerleave',stopRec);
recBtn.addEventListener('contextmenu',e=>e.preventDefault());
function renderPending(){
  const w=document.getElementById('pendWrap');
  w.innerHTML='';
  for(const a of pendingAtts){
    const d=document.createElement('div');d.className='pend';
    if(a.thumb){
      const img=document.createElement('img');
      img.src=URL.createObjectURL(a.thumb);
      d.appendChild(img);
    }
    const label=a.kind==='audio'?'🎤 '+a.dur+'s'
      :a.kind==='vref'?'🎬 索引'
      :a.kind==='fref'?'📎 索引'
      :a.kind==='file'?'📎':'📷';
    d.insertAdjacentHTML('beforeend','<span>'+label+'</span><span class="pn"></span><span class="px" data-pid="'+a.id+'">✕</span>');
    d.querySelector('.pn').textContent=a.name||'';
    w.appendChild(d);
  }
}
document.getElementById('pendWrap').onclick=e=>{

  pendingAtts=pendingAtts.filter(a=>a.id!==x.dataset.pid);

};
/* 位置戳 */
function getGeo(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:+p.coords.latitude.toFixed(5),lng:+p.coords.longitude.toFixed(5),acc:Math.round(p.coords.accuracy)}),
      ()=>res(null),{timeout:2500,maximumAge:300000});
  });
}
function attDesc(a){
  if(a.kind==='img')return '[图片:'+(a.name||'照片')+']';
  if(a.kind==='audio')return '[语音:'+(a.dur||'?')+'秒]';
  if(a.kind==='vref')return '[视频索引:'+a.name+(a.dur?' '+Math.round(a.dur)+'秒':'')+' 原件在相册]';
  if(a.kind==='fref')return '[文件索引:'+a.name+' '+(a.size/1048576).toFixed(1)+'MB 未存入]';
  return '[文件:'+a.name+']';
}

let query='';
let liveURLs=[];
document.getElementById('searchBox').addEventListener('input',e=>{
  query=e.target.value.trim().toLowerCase();render();

function matches(n){
  if(!query)return true;
  if((n.text||'').toLowerCase().includes(query))return true;
  if(n.items&&n.items.some(i=>i.text.toLowerCase().includes(query)))return true;
  if(n.atts&&n.atts.some(a=>(a.name||'').toLowerCase().includes(query)))return true;
  return false;
}
async function render(){
  liveURLs.forEach(u=>URL.revokeObjectURL(u));liveURLs=[];
  const notes=(await all()).filter(matches)
    .sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||b.createdAt-a.createdAt);
  const feed=document.getElementById('feed'),emp=document.getElementById('empty');
  feed.innerHTML='';
  emp.style.display=notes.length?'none':'block';

  const groups={};
  for(const n of notes)(groups[monthOf(n.dateKey)]=groups[monthOf(n.dateKey)]||[]).push(n);

  for(const mk of Object.keys(groups).sort().reverse()){
    const list=groups[mk];
    const [y,m]=mk.split('-');

    mh.innerHTML='<span class="mt">'+y+'年'+Number(m)+'月</span><small>'+list.length+' 条</small>';

      if(n.kind==='list'){
        for(const it of n.items){
          inner+='<div class="item'+(it.done?' done':'')+'" data-iid="'+it.id+'">'+
            '<div class="cb">✓</div><div class="it"></div></div>';
        }
      }else{
        inner+='<div class="tx"></div>';
      }
      c.innerHTML=inner;
      if(n.kind==='list'){
        const rows=c.querySelectorAll('.item .it');
        n.items.forEach((it,i)=>rows[i].textContent=it.text);
      }else{
        c.querySelector('.tx').textContent=n.text;
      }
      if(n.atts&&n.atts.length){
        const g=document.createElement('div');g.className='attsGrid';
        for(const a of n.atts){
          if(a.kind==='img'||a.kind==='vref'){
            const d=document.createElement('div');d.className='att';d.dataset.aid=a.id;
            if(a.thumb){
              const img=document.createElement('img');

              d.appendChild(img);
            }else{
              d.innerHTML='<div style="width:64px;height:64px;border-radius:8px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;">🎬</div>';
            }
            if(a.kind==='vref'){
              d.insertAdjacentHTML('beforeend','<div class="vtag">▶</div>'+
                (a.dur?'<div class="vdur">'+Math.round(a.dur)+'s</div>':''));
            }
            g.appendChild(d);
          }else{
            const d=document.createElement('div');d.className='attChip';d.dataset.aid=a.id;
            d.textContent=a.kind==='audio'?'🎤 '+(a.dur||'?')+'s ▶'
              :a.kind==='fref'?'📎 '+a.name+'(索引)':'📎 '+a.name;

        }

    }

  document.getElementById('statInfo').textContent=cnt.length+' 条';

function updateBackupBanner(notes){
  const el=document.getElementById('backupBanner');
  const last=Number(localStorage.getItem('inboxLastExport')||0);
  if(!notes.length){el.style.display='none';return;}
  const oldest=Math.min(...notes.map(n=>n.createdAt));
  const dataAge=Math.floor((Date.now()-oldest)/86400000);
  const days=last?Math.floor((Date.now()-last)/86400000):null;
  if(last===0&&dataAge>=7){
    el.style.display='block';
    el.innerHTML='⚠️ 数据已攒'+dataAge+'天,从未导出 — 顺手 <b>⬇ JSON</b> 存档一次。';
  }else if(last&&days>=WARN_DAYS){
    el.style.display='block';
    el.innerHTML='⚠️ 距上次导出已 <b>'+days+'</b> 天。该备份了。';
  }else el.style.display='none';
}

document.getElementById('impFile').onchange=async e=>{
  const f=e.target.files[0];e.target.value='';
  if(!f)return;
  try{
    const data=JSON.parse(await f.text());
    const incoming=data.notes||[];
    if(!Array.isArray(incoming)||!incoming.length){toast('文件里没有记录');return;}
    const existing=await all();
    const have=new Map(existing.map(n=>[n.id,n]));
    const revive=n=>{
      if(n.atts)for(const a of n.atts){
        if(typeof a.blob==='string')a.blob=b64ToBlob(a.blob,a.mime);
        if(typeof a.thumb==='string')a.thumb=b64ToBlob(a.thumb,'image/jpeg');
      }
      return n;
    };
    let added=0,merged=0,skipped=0;
    for(const n of incoming){
      if(!n.id){skipped++;continue;}
      const mine=have.get(n.id);
      if(!mine){await put(revive(n));added++;}
      else{
        const seen=new Set((mine.events||[]).map(ev=>ev.k+'|'+ev.t));
        let grew=false;
        for(const ev of (n.events||[])){
          if(!seen.has(ev.k+'|'+ev.t)){mine.events.push(ev);grew=true;}
        }
        if(n.items&&mine.items){
          const mIds=new Set(mine.items.map(i=>i.id));
          for(const it of n.items)if(!mIds.has(it.id)){mine.items.push(it);grew=true;}
        }
        if(grew){mine.events.sort((a,b)=>a.t-b.t);await put(mine);merged++;}
        else skipped++;
      }
    }
    toast('新增'+added+' · 合并'+merged+' · 跳过'+skipped,3000);
    render();
  }catch(err){toast('文件无法解析');}
};

document.querySelectorAll('.rq').forEach(b=>b.onclick=()=>{

  if(b.dataset.q==='1h'){d=new Date(Date.now()+3600000);}
  else if(b.dataset.q==='tonight'){d=new Date();d.setHours(20,0,0,0);if(d<now)d.setDate(d.getDate()+1);}
  else{d=new Date();d.setDate(d.getDate()+1);d.setHours(9,0,0,0);}
  document.getElementById('rmWhen').value=dtLocal(d);
  syncRmButtons();
});
document.getElementById('rmOffsets').onclick=e=>{
  const c=e.target.closest('.ro');if(!c)return;
  c.classList.toggle('on');
  const sel=[...document.querySelectorAll('.ro.on')].map(x=>Number(x.dataset.m));
  saveOffsets(sel.length?sel:[0]);
};
async function logRemind(mode,at){
  if(!remNote)return;
  remNote.events.push({k:'remind',t:Date.now(),at:at,mode:mode});
  await put(remNote);render();
}
document.getElementById('rmAlarm').onclick=async()=>{
  const v=document.getElementById('rmWhen').value;
  if(!v){toast('先选时间');return;}
  const d=new Date(v);
  await logRemind('alarm',d.getTime());
  document.getElementById('rmSheet').style.display='none';
  location.href='intent:#Intent;action=android.intent.action.SET_ALARM;'+
    'i.android.intent.extra.alarm.HOUR='+d.getHours()+';'+
    'i.android.intent.extra.alarm.MINUTES='+d.getMinutes()+';'+
    'S.android.intent.extra.alarm.MESSAGE='+encodeURIComponent(noteTitle(remNote))+';end';
};
document.getElementById('rmIcs').onclick=async()=>{
  const v=document.getElementById('rmWhen').value;
  if(!v){toast('先选时间');return;}
  const d=new Date(v);
  const end=new Date(d.getTime()+1800000);
  const fmt=x=>x.getFullYear()+pad(x.getMonth()+1)+pad(x.getDate())+'T'+pad(x.getHours())+pad(x.getMinutes())+'00';
  const esc=s=>String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const sel=loadOffsets();
  let alarms='';
  for(const m of sel){
    alarms+='BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:INBOX\r\nTRIGGER:-PT'+m+'M\r\nEND:VALARM\r\n';
  }
  const body=remNote.kind==='list'?remNote.items.map(i=>(i.done?'[x] ':'[ ] ')+i.text).join('\\n'):esc(remNote.text);
  const ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//INBOX//ZH\r\nBEGIN:VEVENT\r\n'+
    'UID:'+uid('rm')+'@inbox\r\nDTSTAMP:'+fmt(new Date())+'\r\n'+
    'DTSTART:'+fmt(d)+'\r\nDTEND:'+fmt(end)+'\r\n'+
    'SUMMARY:'+esc(noteTitle(remNote))+'\r\nDESCRIPTION:'+body+'\r\n'+
    alarms+'END:VEVENT\r\nEND:VCALENDAR\r\n';
  await logRemind('ics',d.getTime());
  document.getElementById('rmSheet').style.display='none';
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='reminder_'+dateKeyOf(d.getTime())+'.ics';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},4000);
  toast('已生成,点开进日历 ✓',2800);
};

/* ============ 持久化 ============ */
async function askPersist(){
  const tag=document.getElementById('persistTag');
  if(!navigator.storage||!navigator.storage.persist){tag.textContent='';return;}
  let p=await navigator.storage.persisted();
  if(!p)p=await navigator.storage.persist();
  tag.textContent=p?'🔒':'⚠';
  tag.style.color=p?'var(--ok)':'var(--red)';
}

/* ============ PIN 门锁 ============ */
const LOCK_GRACE=3*60*1000;
async function sha(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('inbox-salt:'+s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
let settingPin=false,pinStage1='';
function showLock(){
  const has=!!localStorage.getItem('pinHash');
  settingPin=!has;pinStage1='';
  document.getElementById('lockTitle').textContent=has?'INBOX 已上锁':'设置 PIN';
  document.getElementById('lockSub').textContent=has
    ?'输入PIN解锁'
    :'首次使用,设一个4-8位数字PIN。\n数据本身不加密,忘了PIN数据也不会丢。';
  document.getElementById('pinBtn').textContent=has?'解锁':'设置';
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinIn').value='';
  document.getElementById('lock').classList.add('open');
  setTimeout(()=>document.getElementById('pinIn').focus(),80);
}
const hideLock=()=>document.getElementById('lock').classList.remove('open');
async function pinSubmit(){
  const v=document.getElementById('pinIn').value.trim();
  const err=document.getElementById('pinErr');
  if(!/^\d{4,8}$/.test(v)){err.textContent='4-8位数字';return;}
  if(settingPin){
    if(!pinStage1){
      pinStage1=v;
      document.getElementById('lockSub').textContent='再输一遍确认';
      document.getElementById('pinIn').value='';err.textContent='';
      return;
    }
    if(v!==pinStage1){
      pinStage1='';
      document.getElementById('lockSub').textContent='两次不一致,重新设置';
      document.getElementById('pinIn').value='';err.textContent='';
      return;
    }
    localStorage.setItem('pinHash',await sha(v));
    hideLock();toast('PIN已设置 🔐');
    return;
  }
  if(await sha(v)===localStorage.getItem('pinHash')){
    hideLock();
  }else{
    err.textContent='不对,再试';
    document.getElementById('pinIn').value='';
  }
}
document.getElementById('pinBtn').onclick=pinSubmit;
document.getElementById('pinIn').addEventListener('keydown',e=>{if(e.key==='Enter')pinSubmit();});
let hiddenAt=null;
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden')hiddenAt=Date.now();
  else if(hiddenAt&&Date.now()-hiddenAt>LOCK_GRACE&&localStorage.getItem('pinHash'))showLock();
});

/* ============ 启动 ============ */
(async()=>{
  showLock();
  await openDB();
  await render();
  askPersist();
})();
</script>
